include: package:flutter_lints/flutter.yaml

linter:
  rules:
    # Prevent accidental debug output in committed code
    avoid_print: true

    # Catch method calls on `dynamic` typed values — forces explicit typing
    avoid_dynamic_calls: true

    # StreamSubscription fields must be cancelled (prevents memory leaks)
    cancel_subscriptions: true

    # Futures returned from async calls must be awaited or explicitly unawaited()
    unawaited_futures: true

    # Prefer compile-time const constructors for Flutter widget performance
    prefer_const_constructors: true
    prefer_const_declarations: true

    # All functions and methods must declare their return type explicitly
    always_declare_return_types: true
